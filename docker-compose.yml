services:
  redis:
    image: redis:7.0.1
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=postgres
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data

  data-migration:
    profiles: ["db"]
    depends_on:
      - postgres
    build:
      context: .
      dockerfile: prisma.Dockerfile
    volumes:
      - ./prisma/:/app/
    environment:
      - DATABASE_URL=postgresql://root:root@postgres:5432/postgres

  localstack:
    image: localstack/localstack:4.10.0
    environment:
      SERVICES: s3
    ports:
      - 4566:4566
    volumes:
      - ./localstack-s3-setup.sh:/etc/localstack/init/ready.d/script.sh
      - "/var/run/docker.sock:/var/run/docker.sock"

  mcp-servers:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    env_file:
      - secrets/aws.env
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
      - "8005:8005"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; [socket.create_connection(('localhost', p), timeout=2).close() for p in range(8001, 8006)]"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  chainlit-ui:
    platform: linux/arm64
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
      localstack:
        condition: service_started
      mcp-servers:
        condition: service_healthy
    build:
      context: ./
    ports:
      - "8000:8000"
    env_file:
      - secrets/azure-openai.env
      - secrets/chainlit.env
      - secrets/langgraph.env
      - secrets/mcp-servers.env
      - secrets/guardrails.env
    volumes:
      - ./chainlit-config.toml:/app/.chainlit/config.toml
      # Need to mount aws env file to give access to MCP servers
      - ${PWD}/secrets/aws.env:/app/aws-creds.env:ro
      # Development purposes
      - ./src:/app/src
      - ./scripts:/app/scripts

volumes:
  redis-data:
  postgres-data:
